const PERSONA_LABELS = { senior_exec: "Senior Executive", mid_exec: "Mid-level Executive", operator: "Operator" };

const personaIcon = (id, cls = "") => {
  if (id === "senior_exec") return <I.Briefcase className={cls} />;
  if (id === "mid_exec") return <I.Users className={cls} />;
  return <I.User className={cls} />;
};

const matchScenario = (query) => {
  const q = query.toLowerCase().trim();
  if (!q) return null;
  for (const sc of DATA.scenarios) {
    for (const kw of sc.matchKeywords) {
      if (q.includes(kw.toLowerCase())) return sc;
    }
  }
  return null;
};

const getResponseForPersona = (scenario, persona) => {
  if (scenario.responseByPersona) return scenario.responseByPersona[persona];
  if (!scenario.personasAllowed.includes(persona)) {
    return {
      answer: `Access restricted. This information is not available for the ${PERSONA_LABELS[persona]} role. Please raise an access request if you require this information for a specific business need.`,
      confidence: "n/a", confidencePercent: null, sources: [],
      reasoning: { intent: scenario.category, retrievedChunks: 0, topChunkScore: 0.0, validationChecks: [`Access control: BLOCK — ${PERSONA_LABELS[persona]} role not authorised for this content`, "Audit log entry: access attempt recorded"] },
      isAccessDenied: true
    };
  }
  return scenario.response;
};

const renderAnswerWithCitations = (text, onCite) => {
  if (!text) return null;
  const parts = text.split(/(\[\d+\])/g);
  return parts.map((part, i) => {
    const m = part.match(/^\[(\d+)\]$/);
    if (m) {
      const n = parseInt(m[1]);
      return (
        <button key={i} onClick={() => onCite(n)}
          className="inline-flex items-center justify-center min-w-[20px] h-5 px-1 mx-0.5 text-[11px] font-medium text-[#1E3A5F] bg-[#E8EEF5] hover:bg-[#D4DEEC] rounded transition-colors align-baseline">
          {n}
        </button>
      );
    }
    return <span key={i} style={{ whiteSpace: 'pre-wrap' }}>{part}</span>;
  });
};

const ConfidenceChip = ({ confidence, percent }) => {
  if (confidence === "insufficient_evidence") {
    return (
      <div className="inline-flex items-center gap-1.5 px-2 py-0.5 bg-blue-50 text-blue-700 border border-blue-200 rounded-md text-xs font-medium">
        <I.Info size={12} /> Insufficient evidence
      </div>
    );
  }
  if (confidence === "n/a") {
    return (
      <div className="inline-flex items-center gap-1.5 px-2 py-0.5 bg-red-50 text-red-700 border border-red-200 rounded-md text-xs font-medium">
        <I.Lock size={12} /> Access denied
      </div>
    );
  }
  const map = {
    high: { Icon: I.Check, color: "text-emerald-700", bg: "bg-emerald-50", border: "border-emerald-200" },
    medium: { Icon: I.Alert, color: "text-amber-700", bg: "bg-amber-50", border: "border-amber-200" },
    low: { Icon: I.Minus, color: "text-slate-700", bg: "bg-slate-50", border: "border-slate-200" }
  };
  const cfg = map[confidence] || map.medium;
  const IconC = cfg.Icon;
  return (
    <div className={`inline-flex items-center gap-1.5 px-2 py-0.5 ${cfg.bg} ${cfg.color} border ${cfg.border} rounded-md text-xs font-medium`}>
      <IconC size={12} />
      {confidence.charAt(0).toUpperCase() + confidence.slice(1)} confidence
      {percent != null && <span className="opacity-70">· {percent}%</span>}
    </div>
  );
};

function App() {
  const [currentPersona, setCurrentPersona] = useState('senior_exec');
  const [messages, setMessages] = useState([]);
  const [inputValue, setInputValue] = useState('');
  const [isThinking, setIsThinking] = useState(false);
  const [streamingText, setStreamingText] = useState('');
  const [streamingMessageId, setStreamingMessageId] = useState(null);
  const [showPersonaMenu, setShowPersonaMenu] = useState(false);
  const [highlightedSource, setHighlightedSource] = useState(null);
  const [modalSource, setModalSource] = useState(null);
  const [activeSources, setActiveSources] = useState([]);
  const [suggestionsOpen, setSuggestionsOpen] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, streamingText, isThinking]);

  // Auto-close suggestions after the first user message (in case user manually opened them)
  useEffect(() => {
    const hasUserMessage = messages.some(m => m.type === 'user');
    if (hasUserMessage && suggestionsOpen) {
      const timer = setTimeout(() => setSuggestionsOpen(false), 400);
      return () => clearTimeout(timer);
    }
  }, [messages]);

  const goHome = () => {
    // Reset the chat session — fresh slate, same persona
    setMessages([]);
    setActiveSources([]);
    setHighlightedSource(null);
    setStreamingText('');
    setStreamingMessageId(null);
    setInputValue('');
    setSuggestionsOpen(false);
    setShowPersonaMenu(false);
    setModalSource(null);
  };

  const handlePersonaChange = (newPersona) => {
    setShowPersonaMenu(false);
    if (newPersona === currentPersona) return;
    setCurrentPersona(newPersona);
    setMessages([]);
    setActiveSources([]);
    setHighlightedSource(null);
    setStreamingText('');
    setStreamingMessageId(null);
    setInputValue('');
    setSuggestionsOpen(false);
  };

  const submitQuery = (queryText) => {
    if (!queryText.trim() || isThinking) return;
    const userMsgId = Date.now();
    setMessages(prev => [...prev, { type: 'user', id: userMsgId, content: queryText, persona: currentPersona }]);
    setInputValue('');
    setIsThinking(true);

    setTimeout(() => {
      const scenario = matchScenario(queryText);
      let response, category;
      if (scenario) {
        response = getResponseForPersona(scenario, currentPersona);
        category = scenario.category;
      } else {
        response = DATA.fallback;
        category = 'Fallback';
      }
      const assistantMsgId = Date.now() + 1;
      setIsThinking(false);
      setStreamingMessageId(assistantMsgId);
      setStreamingText('');
      setActiveSources(response.sources || []);

      const fullText = response.answer;
      let charIdx = 0;
      const step = Math.max(2, Math.floor(fullText.length / 120));
      const interval = setInterval(() => {
        charIdx += step;
        if (charIdx >= fullText.length) {
          clearInterval(interval);
          setStreamingText('');
          setStreamingMessageId(null);
          setMessages(prev => [...prev, { type: 'assistant', id: assistantMsgId, response, persona: currentPersona, category }]);
        } else {
          setStreamingText(fullText.slice(0, charIdx));
        }
      }, 18);
    }, 750);
  };

  const handleCitationClick = (n) => {
    setHighlightedSource(n);
    const el = document.getElementById(`source-${n}`);
    el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => setHighlightedSource(null), 2000);
  };

  const allowedScenarios = DATA.scenarios.filter(sc => sc.personasAllowed.includes(currentPersona) || sc.responseByPersona);

  return (
    <div className="h-screen w-full flex flex-col" style={{ background: 'linear-gradient(135deg, #FDFAF5 0%, #FFFFFF 50%, #F7F4EE 100%)' }}>
      <header className="bg-white/95 backdrop-blur-sm border-b border-slate-200 px-6 py-3 flex items-center justify-between flex-shrink-0 relative" style={{ borderImage: 'linear-gradient(90deg, #1E3A5F 0%, #C9504F 50%, #1E3A5F 100%) 1', borderBottomWidth: '2px', borderBottomStyle: 'solid' }}>
        <button onClick={goHome} className="flex items-center gap-3 hover:opacity-80 transition-opacity group" title="Back to home">
          <img src={ALEF_LOGO} alt="Alef" className="h-9 w-auto" />
          <div className="h-6 w-px bg-slate-300"></div>
          <span className="font-semibold text-lg group-hover:underline decoration-2 underline-offset-4" style={{ color: '#1E3A5F' }}>AskAlef</span>
          <span className="text-[11px] px-2 py-0.5 rounded-full font-medium inline-flex items-center gap-1" style={{ background: '#FDF2F0', color: '#C9504F', border: '1px solid #F4C7C5' }}>
            <I.Eye size={10} /> Demo Preview
          </span>
        </button>

        <div className="flex items-center gap-2 relative">
          <button onClick={() => setShowPersonaMenu(!showPersonaMenu)}
            className="flex items-center gap-2 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-full text-sm transition-colors">
            <div className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background: '#1E3A5F' }}>
              {personaIcon(currentPersona, "w-3 h-3 text-white")}
            </div>
            <span className="font-medium text-slate-700">Viewing as: {PERSONA_LABELS[currentPersona]}</span>
            <I.ChevronDown size={16} className={`text-slate-500 transition-transform ${showPersonaMenu ? 'rotate-180' : ''}`} />
          </button>

          {showPersonaMenu && (
            <div className="absolute right-0 top-12 bg-white shadow-xl border border-slate-200 rounded-xl overflow-hidden min-w-[280px] z-50">
              {DATA.personas.map((p) => (
                <button key={p.id} onClick={() => handlePersonaChange(p.id)}
                  className={`w-full text-left px-4 py-3 hover:bg-slate-50 transition-colors flex items-center gap-3 ${p.id === currentPersona ? 'bg-slate-50' : ''}`}>
                  <div className={`w-8 h-8 rounded-lg flex items-center justify-center`} style={{ background: p.id === currentPersona ? '#1E3A5F' : '#E8EEF5' }}>
                    {personaIcon(p.id, `w-4 h-4 ${p.id === currentPersona ? 'text-white' : 'text-[#1E3A5F]'}`)}
                  </div>
                  <div className="flex-1">
                    <div className="font-medium text-sm text-slate-900">{p.label}</div>
                    <div className="text-[11px] text-slate-500 leading-tight">{p.short}</div>
                  </div>
                  {p.id === currentPersona && <I.Check size={16} className="text-[#1E3A5F]" />}
                </button>
              ))}
            </div>
          )}
        </div>
      </header>

      <div className="flex-1 flex overflow-hidden">
        <div className="flex-1 flex flex-col min-w-0">
          <div className="flex-1 overflow-y-auto px-6 py-6">
            <div className="max-w-3xl mx-auto space-y-5">
              <div className="flex gap-3">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: 'linear-gradient(135deg, #1E3A5F, #2E5077)' }}>
                  <I.Sparkles size={16} className="text-white" />
                </div>
                <div className="flex-1 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm border" style={{ background: 'linear-gradient(135deg, #FDFAF5 0%, #FFFFFF 100%)', borderColor: '#F4C7C5' }}>
                  <p className="text-sm text-slate-700 leading-relaxed">{DATA.product.welcomeMessage}</p>
                  <p className="text-xs text-slate-500 mt-2">You're signed in as <span className="font-medium" style={{ color: '#1E3A5F' }}>{PERSONA_LABELS[currentPersona]}</span>. Try one of the suggested questions below.</p>
                </div>
              </div>

              {messages.map((msg) => {
                if (msg.type === 'persona_change') {
                  return (
                    <div key={msg.id} className="flex items-center gap-3 py-2">
                      <div className="flex-1 h-px bg-slate-200"></div>
                      <div className="text-[11px] text-slate-500 bg-slate-100 px-3 py-1 rounded-full inline-flex items-center gap-1.5">
                        <I.Shield size={12} /> Persona changed: {PERSONA_LABELS[msg.from]} → {PERSONA_LABELS[msg.to]}
                      </div>
                      <div className="flex-1 h-px bg-slate-200"></div>
                    </div>
                  );
                }
                if (msg.type === 'user') {
                  return (
                    <div key={msg.id} className="flex gap-3 justify-end">
                      <div className="max-w-[80%] text-white rounded-2xl rounded-tr-md px-4 py-2.5 shadow-md" style={{ background: 'linear-gradient(135deg, #1E3A5F 0%, #2E5077 100%)' }}>
                        <p className="text-sm leading-relaxed" style={{ whiteSpace: 'pre-wrap' }}>{msg.content}</p>
                      </div>
                      <div className="w-8 h-8 rounded-lg bg-slate-200 flex items-center justify-center flex-shrink-0">
                        {personaIcon(msg.persona, "w-4 h-4 text-slate-600")}
                      </div>
                    </div>
                  );
                }
                const resp = msg.response;
                return (
                  <div key={msg.id} className="flex gap-3">
                    <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: resp.isAccessDenied ? '#FEE2E2' : 'linear-gradient(135deg, #1E3A5F, #2E5077)' }}>
                      {resp.isAccessDenied ? <I.Lock size={16} className="text-red-600" /> : <I.Sparkles size={16} className="text-white" />}
                    </div>
                    <div className="flex-1 max-w-[88%] bg-white border border-slate-200 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm">
                      <div className="text-sm text-slate-800 leading-relaxed">
                        {renderAnswerWithCitations(resp.answer, (n) => {
                          if (resp.sources.find(s => s.id === n)) {
                            setActiveSources(resp.sources);
                            handleCitationClick(n);
                          }
                        })}
                      </div>
                      <div className="mt-3 flex items-center justify-between gap-3 flex-wrap">
                        <ConfidenceChip confidence={resp.confidence} percent={resp.confidencePercent} />
                        {msg.category && (
                          <div className="text-[11px] text-slate-400 inline-flex items-center gap-1">
                            <I.Message size={12} /> {msg.category}
                          </div>
                        )}
                      </div>
                      <ReasoningExpander reasoning={resp.reasoning} />
                    </div>
                  </div>
                );
              })}

              {streamingMessageId && (
                <div className="flex gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: 'linear-gradient(135deg, #1E3A5F, #2E5077)' }}>
                    <I.Sparkles size={16} className="text-white" />
                  </div>
                  <div className="flex-1 max-w-[88%] bg-white border border-slate-200 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm">
                    <div className="text-sm text-slate-800 leading-relaxed" style={{ whiteSpace: 'pre-wrap' }}>
                      {streamingText}<span className="inline-block w-1.5 h-3.5 ml-0.5 align-middle cursor-blink" style={{ background: '#1E3A5F' }}></span>
                    </div>
                  </div>
                </div>
              )}

              {isThinking && (
                <div className="flex gap-3">
                  <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{ background: 'linear-gradient(135deg, #1E3A5F, #2E5077)' }}>
                    <I.Sparkles size={16} className="text-white" style={{ animation: 'pulse-dot 1.5s ease-in-out infinite' }} />
                  </div>
                  <div className="bg-white border border-slate-200 rounded-2xl rounded-tl-md px-4 py-3 shadow-sm">
                    <div className="flex items-center gap-1.5">
                      <span className="w-2 h-2 rounded-full dot-bounce" style={{ background: 'rgba(30, 58, 95, 0.4)', animationDelay: '0ms' }}></span>
                      <span className="w-2 h-2 rounded-full dot-bounce" style={{ background: 'rgba(30, 58, 95, 0.4)', animationDelay: '150ms' }}></span>
                      <span className="w-2 h-2 rounded-full dot-bounce" style={{ background: 'rgba(30, 58, 95, 0.4)', animationDelay: '300ms' }}></span>
                      <span className="text-xs text-slate-500 ml-2">Retrieving & validating...</span>
                    </div>
                  </div>
                </div>
              )}

              <div ref={chatEndRef} />
            </div>
          </div>

          <div className="border-t border-slate-200 bg-white px-6 py-4 flex-shrink-0">
            <div className="max-w-3xl mx-auto relative">
              {suggestionsOpen && (
                <div className="absolute bottom-full left-0 right-0 mb-2 bg-white border border-slate-200 rounded-xl shadow-xl p-3 z-30">
                  <div className="flex items-center justify-between mb-2.5">
                    <div className="text-[11px] text-slate-500 font-medium uppercase tracking-wide">Suggested questions ({allowedScenarios.length})</div>
                    <button onClick={() => setSuggestionsOpen(false)} className="text-slate-400 hover:text-slate-600">
                      <I.X size={14} />
                    </button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {allowedScenarios.map((sc) => (
                      <button key={sc.id} onClick={() => { submitQuery(sc.promptText); setSuggestionsOpen(false); }}
                        disabled={isThinking || streamingMessageId}
                        className="text-xs px-3 py-1.5 bg-white hover:bg-[#FDF2F0] hover:text-[#C9504F] text-slate-700 border border-slate-200 hover:border-[#C9504F]/40 rounded-full transition-all hover:shadow-sm disabled:opacity-40 disabled:cursor-not-allowed text-left">
                        {sc.suggestedPrompt}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              <div className="flex items-center gap-2">
                <button onClick={() => setSuggestionsOpen(!suggestionsOpen)}
                  disabled={isThinking || streamingMessageId}
                  title="Suggested questions"
                  className={`h-10 px-3 rounded-xl text-xs font-medium flex items-center gap-1.5 border transition-colors flex-shrink-0 disabled:opacity-40 disabled:cursor-not-allowed ${suggestionsOpen ? 'bg-[#E8EEF5] text-[#1E3A5F] border-[#1E3A5F]/30' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-50'}`}>
                  <I.Sparkles size={14} />
                  <span className="hidden sm:inline">Suggestions</span>
                  <span className="text-[10px] opacity-60">({allowedScenarios.length})</span>
                </button>
                <input type="text" value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') submitQuery(inputValue); }}
                  placeholder="Ask anything about Alef projects, policies, or markets..."
                  disabled={isThinking || streamingMessageId}
                  className="flex-1 px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none disabled:bg-slate-50 disabled:cursor-not-allowed"
                  style={{ fontFamily: 'inherit' }} />
                <button onClick={() => submitQuery(inputValue)}
                  disabled={isThinking || streamingMessageId || !inputValue.trim()}
                  className="w-10 h-10 rounded-xl text-white flex items-center justify-center transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0"
                  style={{ background: '#1E3A5F' }}>
                  <I.Send size={16} />
                </button>
              </div>
            </div>
          </div>
        </div>

        <div className="w-96 border-l border-slate-200 flex flex-col flex-shrink-0" style={{ background: 'rgba(253, 250, 245, 0.5)' }}>
          <div className="px-4 py-3 border-b border-slate-200 bg-white flex items-center justify-between">
            <div className="flex items-center gap-2">
              <I.FileText size={16} className="text-slate-500" />
              <span className="text-sm font-semibold text-slate-700">Sources</span>
              {activeSources.length > 0 && (
                <span className="text-[11px] text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{activeSources.length}</span>
              )}
            </div>
          </div>
          <div className="flex-1 overflow-y-auto p-3 space-y-2.5">
            {activeSources.length === 0 ? (
              <div className="text-center py-12 text-slate-400">
                <I.FileText size={32} className="mx-auto mb-2 opacity-40" />
                <div className="text-xs">Source documents will appear here once you ask a question</div>
              </div>
            ) : (
              activeSources.map((s) => (
                <SourceCard key={s.id} source={s} highlighted={highlightedSource === s.id} onOpen={setModalSource} />
              ))
            )}
          </div>
        </div>
      </div>

      <SourceModal source={modalSource} onClose={() => setModalSource(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
